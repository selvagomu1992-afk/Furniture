<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Jangid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">J</div>
        <span class="sidebar-brand">JANGID</span>
      </div>
      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-section="collections">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Collections
        </button>
        <button class="nav-item" data-section="products">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Products
        </button>
        <button class="nav-item" data-section="rates">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Rates
        </button>
        <button class="nav-item" data-section="address">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Address
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item" id="back-to-site">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to Site
        </button>
        <button class="nav-item" id="signout-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">

      <!-- Dashboard -->
      <section class="admin-section active" id="section-dashboard">
        <div class="section-top">
          <h1>Dashboard</h1>
          <span class="admin-badge">Admin</span>
        </div>
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-value" id="stat-users">—</div><div class="stat-label">Users</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-products">—</div><div class="stat-label">Products</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-orders">—</div><div class="stat-label">Orders</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-collections">—</div><div class="stat-label">Collections</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-revenue">—</div><div class="stat-label">Revenue</div></div>
          <div class="stat-card"><div class="stat-value" id="stat-messages">—</div><div class="stat-label">Messages</div></div>
        </div>
        <div class="dashboard-panels">
          <div class="panel">
            <h3>Orders by Status</h3>
            <div id="orders-by-status"><p class="muted">Loading...</p></div>
          </div>
        </div>
      </section>

      <!-- Collections -->
      <section class="admin-section" id="section-collections">
        <div class="section-top">
          <h1>Collections</h1>
          <button class="btn-primary" id="add-collection-btn">+ Add Collection</button>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="collections-table">
            <thead><tr><th>Name</th><th>Slug</th><th>Products</th><th>Actions</th></tr></thead>
            <tbody id="collections-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- Products -->
      <section class="admin-section" id="section-products">
        <div class="section-top">
          <h1>Products</h1>
          <button class="btn-primary" id="add-product-btn">+ Add Product</button>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="products-table">
            <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Collection</th><th>Stock</th><th>Actions</th></tr></thead>
            <tbody id="products-tbody"></tbody>
          </table>
        </div>
      </section>

      <!-- Rates -->
      <section class="admin-section" id="section-rates">
        <div class="section-top"><h1>Rates & Pricing</h1></div>
        <form id="rates-form" class="admin-form">
          <div class="form-group"><label>Delivery Rate ($)</label><input type="number" id="rate-delivery" class="form-input" /></div>
          <div class="form-group"><label>Tax Rate (%)</label><input type="number" id="rate-tax" class="form-input" step="0.1" /></div>
          <div class="form-group"><label>Minimum Order ($)</label><input type="number" id="rate-minimum" class="form-input" /></div>
          <button type="submit" class="btn-primary">Save Rates</button>
        </form>
      </section>

      <!-- Address -->
      <section class="admin-section" id="section-address">
        <div class="section-top"><h1>Company Address</h1></div>
        <form id="address-form" class="admin-form">
          <div class="form-group"><label>Company Name</label><input type="text" id="addr-name" class="form-input" /></div>
          <div class="form-group"><label>Address</label><input type="text" id="addr-address" class="form-input" /></div>
          <div class="form-group"><label>Phone</label><input type="text" id="addr-phone" class="form-input" /></div>
          <div class="form-group"><label>Email</label><input type="email" id="addr-email" class="form-input" /></div>
          <button type="submit" class="btn-primary">Save Address</button>
        </form>
      </section>

    </main>
  </div>

  <!-- Modals -->
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title">New Collection</h2>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <!-- Toast -->
  <div id="admin-toast"></div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
